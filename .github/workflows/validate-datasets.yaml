name: Dataset Standards Validation

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '0 0,12 * * *'
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
      contents: read

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          version: "latest"

      - name: Run validation & Comment (PR Check)
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          chmod +x .github/scripts/validate_datasets.py
          # Capture JSON output and prevent step failure
          OUTPUT=$(.github/scripts/validate_datasets.py --format json || true)
          # Pass results to sync_issues.py in PR mode
          export RESULTS="$OUTPUT"
          python .github/scripts/sync_issues.py --mode pr

      - name: Run validation (Issue Sync)
        id: run_validation
        if: github.event_name != 'pull_request'
        run: |
          chmod +x .github/scripts/validate_datasets.py
          OUTPUT=$(.github/scripts/validate_datasets.py --format json || true)
          echo "results=$OUTPUT" >> $GITHUB_OUTPUT

      - name: Sync GitHub Issues
        if: github.event_name != 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
          RESULTS: ${{ steps.run_validation.outputs.results }}
        run: |
          python .github/scripts/sync_issues.py --mode issues